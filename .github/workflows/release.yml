name: Package and release Aura Resonance

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - "v*"
      - "plan-*"
  workflow_dispatch:
    inputs:
      scope:
        description: Build scope
        type: choice
        options: [auto, full, plan]
        default: auto
      publish_release:
        description: Publish artifacts to a GitHub Release
        type: boolean
        default: false
      release_tag:
        description: Release tag for a manually published run
        type: string
        required: false
      run_gpu_smoke:
        description: Run CUDA OCR smoke on a self-hosted Windows GPU runner
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: package-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: utf-8
  OCR_MODEL_RELEASE_TAG: ${{ vars.AURA_OCR_MODEL_RELEASE_TAG || 'model-ppocrv5-server-v1' }}
  OCR_MODEL_ASSET: ${{ vars.AURA_OCR_MODEL_ASSET || 'models-ocr-ppocrv5_server-v1.zip' }}
  OCR_MODEL_CHECKSUM_ASSET: ${{ vars.AURA_OCR_MODEL_SHA256_ASSET || 'models-ocr-ppocrv5_server-v1.sha256' }}

jobs:
  scope:
    runs-on: windows-2022
    outputs:
      scope: ${{ steps.classify.outputs.scope }}
      release_label: ${{ steps.label.outputs.release_label }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve release label
        id: label
        shell: pwsh
        env:
          MANUAL_TAG: ${{ inputs.release_tag }}
        run: |
          if ($env:GITHUB_REF -like "refs/tags/*") {
            $label = $env:GITHUB_REF_NAME
          } elseif ($env:GITHUB_EVENT_NAME -eq "workflow_dispatch" -and $env:MANUAL_TAG) {
            $label = $env:MANUAL_TAG
          } else {
            $label = $env:GITHUB_SHA.Substring(0, 7)
          }
          $label = $label -replace '[^A-Za-z0-9._-]', '-'
          "release_label=$label" >> $env:GITHUB_OUTPUT

      - name: Detect release scope
        id: classify
        shell: pwsh
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BASE_SHA: ${{ github.event.before }}
          MANUAL_SCOPE: ${{ inputs.scope }}
        run: |
          $base = ""
          $forced = "auto"
          if ($env:GITHUB_REF -like "refs/tags/v*") {
            $forced = "full"
          } elseif ($env:GITHUB_REF -like "refs/tags/plan-*") {
            $forced = "plan"
          } elseif ($env:GITHUB_EVENT_NAME -eq "pull_request") {
            $base = $env:PR_BASE_SHA
          } elseif ($env:GITHUB_EVENT_NAME -eq "push") {
            $base = $env:PUSH_BASE_SHA
          } elseif ($env:GITHUB_EVENT_NAME -eq "workflow_dispatch") {
            if ($env:MANUAL_SCOPE) { $forced = $env:MANUAL_SCOPE }
            $base = (git rev-parse HEAD^ 2>$null)
          }
          $detectArgs = @(
            "scripts\release\detect_release_scope.py",
            "--head", $env:GITHUB_SHA,
            "--force", $forced,
            "--github-output", $env:GITHUB_OUTPUT
          )
          if ($base) { $detectArgs += @("--base", $base) }
          python @detectArgs

  ci:
    runs-on: windows-2022
    needs: scope
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/*.txt

      - name: Install CI dependencies
        shell: pwsh
        run: python -m pip install --disable-pip-version-check -r requirements\ci.txt

      - name: Validate Plan manifests
        shell: pwsh
        run: |
          Get-ChildItem plans -Directory | Where-Object {
            Test-Path (Join-Path $_.FullName "manifest.yaml")
          } | ForEach-Object {
            python -m packages.aura_core.cli.package_cli check $_.FullName
            if ($LASTEXITCODE -ne 0) { throw "Plan manifest is out of date: $($_.Name)" }
            python -m packages.aura_core.cli.package_cli validate $_.FullName
            if ($LASTEXITCODE -ne 0) { throw "Plan manifest is invalid: $($_.Name)" }
          }

      - name: Run test suite
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest tests -q

  build-plan:
    runs-on: windows-2022
    needs: [scope, ci]
    if: ${{ github.event_name != 'pull_request' && needs.scope.outputs.scope == 'plan' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch MuMu runtime assets
        shell: pwsh
        run: python scripts\fetch_mumu_runtime_assets.py

      - name: Build complete filtered Plan replacement package
        id: plan
        shell: pwsh
        env:
          RELEASE_LABEL: ${{ needs.scope.outputs.release_label }}
        run: |
          $archive = ".runtime-plan\AuraResonance-plans-$env:RELEASE_LABEL.zip"
          python scripts\release\build_plan_package.py --archive $archive
          if ($LASTEXITCODE -ne 0) { throw "Plan package build failed." }
          "artifact_path=$archive" >> $env:GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: release-plans
          path: ${{ steps.plan.outputs.artifact_path }}
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

  build-full:
    needs: [scope, ci]
    if: ${{ github.event_name != 'pull_request' && needs.scope.outputs.scope == 'full' }}
    strategy:
      fail-fast: false
      matrix:
        profile: [cpu, gpu]
    uses: ./.github/workflows/_build-windows.yml
    with:
      profile: ${{ matrix.profile }}
      release_label: ${{ needs.scope.outputs.release_label }}
      ocr_model_release_tag: ${{ vars.AURA_OCR_MODEL_RELEASE_TAG || 'model-ppocrv5-server-v1' }}
      ocr_model_asset: ${{ vars.AURA_OCR_MODEL_ASSET || 'models-ocr-ppocrv5_server-v1.zip' }}
      ocr_model_checksum_asset: ${{ vars.AURA_OCR_MODEL_SHA256_ASSET || 'models-ocr-ppocrv5_server-v1.sha256' }}

  build-overlay:
    needs: [scope, ci]
    if: ${{ github.event_name != 'pull_request' && needs.scope.outputs.scope == 'full' }}
    uses: ./.github/workflows/_build-windows.yml
    with:
      profile: overlay
      release_label: ${{ needs.scope.outputs.release_label }}
      ocr_model_release_tag: ${{ vars.AURA_OCR_MODEL_RELEASE_TAG || 'model-ppocrv5-server-v1' }}
      ocr_model_asset: ${{ vars.AURA_OCR_MODEL_ASSET || 'models-ocr-ppocrv5_server-v1.zip' }}
      ocr_model_checksum_asset: ${{ vars.AURA_OCR_MODEL_SHA256_ASSET || 'models-ocr-ppocrv5_server-v1.sha256' }}

  gpu-smoke:
    runs-on: [self-hosted, windows, gpu]
    needs: [scope, build-full, build-overlay]
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_gpu_smoke && needs.scope.outputs.scope == 'full' }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-full-*
          path: .runtime-artifacts
          merge-multiple: true

      - name: Verify CUDA OCR provider
        shell: pwsh
        env:
          RELEASE_LABEL: ${{ needs.scope.outputs.release_label }}
        run: |
          $work = ".runtime-gpu-smoke"
          New-Item -ItemType Directory -Force -Path $work | Out-Null
          $gpuZip = ".runtime-artifacts\AuraResonance-$env:RELEASE_LABEL-win-x64-gpu.zip"
          $overlayZip = ".runtime-artifacts\AuraResonance-$env:RELEASE_LABEL-nvidia-cu13-overlay.zip"
          Expand-Archive -LiteralPath $gpuZip -DestinationPath $work -Force
          Expand-Archive -LiteralPath $overlayZip -DestinationPath $work -Force
          $release = Join-Path $work "AuraResonance-$env:RELEASE_LABEL-win-x64-gpu"
          & pwsh -NoProfile -File (Join-Path $release "run.ps1") doctor --ocr --ocr-provider cuda
          if ($LASTEXITCODE -ne 0) { throw "CUDA OCR smoke failed." }

  publish:
    runs-on: windows-2022
    permissions:
      contents: write
    needs: [scope, ci, build-plan, build-full, build-overlay]
    if: >-
      ${{
        always() &&
        needs.ci.result == 'success' &&
        (startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_release)) &&
        (
          (needs.scope.outputs.scope == 'plan' && needs.build-plan.result == 'success') ||
          (needs.scope.outputs.scope == 'full' && needs.build-full.result == 'success' && needs.build-overlay.result == 'success')
        )
      }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: .runtime-artifacts
          merge-multiple: true

      - name: Generate checksums
        shell: pwsh
        run: |
          $files = @(Get-ChildItem .runtime-artifacts -File -Filter "*.zip" | Sort-Object Name)
          if ($files.Count -lt 1) { throw "No release archives were downloaded." }
          $lines = foreach ($file in $files) {
            $hash = (Get-FileHash -LiteralPath $file.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($file.Name)"
          }
          $lines | Set-Content .runtime-artifacts\SHA256SUMS.txt -Encoding ascii

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          MANUAL_TAG: ${{ inputs.release_tag }}
        run: |
          $tag = if ($env:GITHUB_REF -like "refs/tags/*") { $env:GITHUB_REF_NAME } else { $env:MANUAL_TAG }
          if (-not $tag) { throw "A release tag is required for publishing." }
          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag `
              --repo $env:GITHUB_REPOSITORY `
              --target $env:GITHUB_SHA `
              --title $tag `
              --notes "Automated Aura Resonance package build for $tag."
            if ($LASTEXITCODE -ne 0) { throw "Failed to create release $tag." }
          }
          $assets = @(Get-ChildItem .runtime-artifacts -File | Where-Object {
            $_.Extension -eq ".zip" -or $_.Name -eq "SHA256SUMS.txt"
          })
          foreach ($asset in $assets) {
            gh release upload $tag $asset.FullName --repo $env:GITHUB_REPOSITORY --clobber
            if ($LASTEXITCODE -ne 0) { throw "Failed to upload $($asset.Name)." }
          }
