            & powershell -NoProfile -ExecutionPolicy Bypass -File (Join-Path $release "run.ps1") @CliArgs
            if ($LASTEXITCODE -ne 0) {
              throw "Release CLI smoke failed: $($CliArgs -join ' ')"
            }
          }
          Invoke-ReleaseCli -CliArgs @("games", "--all")
          Invoke-ReleaseCli -CliArgs @("tasks", "yihuan")
          Invoke-ReleaseCli -CliArgs @("run", "yihuan", "tasks:checks:plan_loaded.yaml", "--timeout-sec", "120")

      - name: Smoke test GPU+CPU GUI runtime
        shell: pwsh
        run: |
          $release = Join-Path ".runtime-gpu\release" $env:GPU_RELEASE_NAME
          $env:AURA_BASE_PATH = (Resolve-Path $release).Path
          $env:PYTHONNOUSERSITE = "1"
          $process = Start-Process `
            -FilePath (Join-Path $release "runtime\AuraYihuanRuntime.exe") `
            -ArgumentList "--self-check" `
            -Wait `
            -PassThru `
            -NoNewWindow
          if ($process.ExitCode -ne 0) {
            throw "GPU GUI runtime self-check failed with exit code $($process.ExitCode)."
          }

      - name: Upload GPU+CPU package artifact
        uses: actions/upload-artifact@v4
        with:
          name: aura-release-gpu-onnx
          path: .runtime-gpu/release/aura-release-gpu-onnx.zip
          if-no-files-found: error
          retention-days: 3
          compression-level: 0

  build-nvidia-overlay:
    name: Build NVIDIA runtime overlay
    runs-on: windows-2022
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.create_overlay) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.AURA_PYTHON_VERSION }}

      - name: Install GPU and NVIDIA runtime dependencies
        shell: pwsh
        run: |
          python -m venv .venv-release-gpu-onnx
          .\.venv-release-gpu-onnx\Scripts\python.exe -m pip install -U pip
          .\.venv-release-gpu-onnx\Scripts\python.exe -m pip install `
            -r requirements\runtime.txt `
            -r requirements\optional-vision-onnx-cuda.txt `
            -r requirements\optional-nvidia-runtime-cu12.txt `
            "pyinstaller==$env:PYINSTALLER_VERSION"

      - name: Build NVIDIA overlay zip
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass `
            -File scripts\build_release.ps1 `
            -VenvPython .venv-release-gpu-onnx\Scripts\python.exe `
            -ReleaseName $env:GPU_RELEASE_NAME `
            -RuntimeRoot .runtime-gpu-overlay `
            -OnnxRuntimeProfile gpu `
            -SkipBuild `
            -SkipAssemble `
            -CreateNvidiaOverlay

      - name: Validate NVIDIA overlay
        shell: pwsh
        run: |
          $overlay = Join-Path ".runtime-gpu-overlay\release" "$env:GPU_RELEASE_NAME-nvidia-overlay\$env:GPU_RELEASE_NAME"
          $mustExist = @(
            "runtime\_internal\nvidia\cuda_runtime\bin\cudart64_12.dll",
            "runtime\_internal\nvidia\cublas\bin\cublas64_12.dll",
            "runtime\_internal\nvidia\cublas\bin\cublasLt64_12.dll",
            "runtime\_internal\nvidia\cudnn\bin\cudnn64_9.dll",
            "runtime\_internal\nvidia\cufft\bin\cufft64_11.dll",
            "NVIDIA-RUNTIME-OVERLAY.txt"
          )
          foreach ($relativePath in $mustExist) {
            $path = Join-Path $overlay $relativePath
            if (-not (Test-Path $path)) { throw "Missing required NVIDIA overlay path: $path" }
          }

          $zipPath = ".runtime-gpu-overlay\release\aura-release-gpu-onnx-nvidia-overlay.zip"
          $maxBytes = [int64](1.9 * 1024 * 1024 * 1024)
          $actualBytes = (Get-Item -LiteralPath $zipPath).Length
          if ($actualBytes -gt $maxBytes) {
            throw "NVIDIA overlay zip is too large: $actualBytes bytes > $maxBytes bytes."
          }

      - name: Upload NVIDIA overlay artifact
        uses: actions/upload-artifact@v4
        with:
          name: aura-release-gpu-onnx-nvidia-overlay
          path: .runtime-gpu-overlay/release/aura-release-gpu-onnx-nvidia-overlay.zip
          if-no-files-found: error
          retention-days: 3
          compression-level: 0

  publish-assets:
    name: Publish release assets
    runs-on: windows-2022
    needs:
      - build-cpu
      - build-gpu
      - build-nvidia-overlay
    if: ${{ always() && needs.build-cpu.result == 'success' && needs.build-gpu.result == 'success' && (needs.build-nvidia-overlay.result == 'success' || needs.build-nvidia-overlay.result == 'skipped') }}
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: aura-release-*
          path: .runtime-artifacts
          merge-multiple: true

      - name: Generate SHA256SUMS.txt
        shell: pwsh
        run: |
          $artifactDir = ".runtime-artifacts"
          $zipFiles = @(Get-ChildItem -LiteralPath $artifactDir -File -Filter "*.zip" | Sort-Object Name)
          if ($zipFiles.Count -lt 2) {
            throw "Expected at least CPU and GPU release zip artifacts."
          }
          $lines = foreach ($file in $zipFiles) {
            $hash = (Get-FileHash -LiteralPath $file.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($file.Name)"
          }
          $lines | Set-Content -Path (Join-Path $artifactDir "SHA256SUMS.txt") -Encoding ascii
          Get-Content -LiteralPath (Join-Path $artifactDir "SHA256SUMS.txt")

      - name: Upload checksum artifact
        uses: actions/upload-artifact@v4
        with:
          name: aura-release-checksums
          path: .runtime-artifacts/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 3

      - name: Upload assets to GitHub Release
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish_release) }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG_INPUT: ${{ inputs.release_tag }}
        run: |
          function Get-NextReleaseTag {
            $releaseJson = gh release list `
              --repo $env:GITHUB_REPOSITORY `
              --limit 1000 `
              --json tagName
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to list existing GitHub Releases."
            }

            $highestMajor = 0
            $highestMinor = -1
            if ($releaseJson) {
              foreach ($release in ($releaseJson | ConvertFrom-Json)) {
                $tagName = [string]$release.tagName
                if ($tagName -notmatch "^v(?<major>\d+)\.(?<minor>\d+)$") {
                  continue
                }

                $major = [int]$Matches.major
                $minor = [int]$Matches.minor
                if ($major -gt $highestMajor -or ($major -eq $highestMajor -and $minor -gt $highestMinor)) {
                  $highestMajor = $major
                  $highestMinor = $minor
                }
              }
            }

            if ($highestMinor -lt 0) {
              return "v0.1"
            }
            return "v$highestMajor.$($highestMinor + 1)"
          }

          $releaseTarget = $null
          if ($env:GITHUB_EVENT_NAME -eq "push") {
            if ($env:GITHUB_REF -like "refs/tags/*") {
              $tag = $env:GITHUB_REF_NAME
            }
            else {
              $tag = Get-NextReleaseTag
              $releaseTarget = $env:GITHUB_SHA
              Write-Host "Auto release tag for main push: $tag -> $releaseTarget"
            }
          }
          else {
            $tag = $env:RELEASE_TAG_INPUT
          }
          if (-not $tag) {
            throw "Release tag is empty."
          }

          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -ne 0) {
            $createArgs = @(
              "release",
              "create",
              $tag,
              "--repo",
              $env:GITHUB_REPOSITORY,
              "--title",
              $tag,
              "--notes",
              "Automated Aura release package build for $tag."
            )
            if ($releaseTarget) {
              $createArgs += @("--target", $releaseTarget)
            }
            & gh @createArgs
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to create GitHub Release $tag."
            }
          }

          $assets = @(Get-ChildItem -LiteralPath ".runtime-artifacts" -File | Where-Object {
            $_.Extension -eq ".zip" -or $_.Name -eq "SHA256SUMS.txt"
          } | Sort-Object Name)
          foreach ($asset in $assets) {
            gh release upload $tag $asset.FullName --repo $env:GITHUB_REPOSITORY --clobber
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to upload release asset: $($asset.FullName)"
            }
          }

  gpu-smoke:
    name: CUDA smoke on self-hosted GPU runner
    runs-on: [self-hosted, windows, gpu]
    needs:
      - build-gpu
      - build-nvidia-overlay
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_gpu_smoke && inputs.create_overlay && needs.build-gpu.result == 'success' && needs.build-nvidia-overlay.result == 'success' }}
    steps:
      - name: Download GPU package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: aura-release-gpu-onnx*
          path: .runtime-artifacts
          merge-multiple: true

      - name: Force CUDA OCR preload smoke
        shell: pwsh
        run: |
          $workDir = ".runtime-gpu-smoke"
          if (Test-Path $workDir) {
            Remove-Item -LiteralPath $workDir -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $workDir | Out-Null

          Expand-Archive -LiteralPath ".runtime-artifacts\aura-release-gpu-onnx.zip" -DestinationPath $workDir -Force
          $release = Join-Path $workDir "aura-release-gpu-onnx"
          Expand-Archive -LiteralPath ".runtime-artifacts\aura-release-gpu-onnx-nvidia-overlay.zip" -DestinationPath $workDir -Force

          $configPath = Join-Path $release "config.yaml"
          $updatedConfig = Get-Content -LiteralPath $configPath | ForEach-Object {
            if ($_ -match "^\s*execution_provider\s*:") {
              "  execution_provider: cuda"
            }
            else {
              $_
            }
          }
          $updatedConfig | Set-Content -Path $configPath -Encoding UTF8

          $taskDir = Join-Path $release "plans\yihuan\tasks\checks"
          New-Item -ItemType Directory -Force -Path $taskDir | Out-Null
          @'
          ocr_preload_smoke:
            meta:
              title: OCR preload smoke
              description: Temporary packaged-release smoke test for ONNX OCR session loading.
            steps:
              preload:
                action: preload_ocr
                params:
                  warmup: false
            returns: "{{ nodes.preload.output }}"
          '@ | Set-Content -Path (Join-Path $taskDir "ocr_preload_smoke.yaml") -Encoding UTF8

          $output = powershell -NoProfile -ExecutionPolicy Bypass `
            -File (Join-Path $release "run.ps1") `
            run yihuan tasks:checks:ocr_preload_smoke.yaml --timeout-sec 240 2>&1
          $output | Write-Host
          if ($LASTEXITCODE -ne 0) {
            throw "GPU OCR preload smoke failed."
          }
          if (($output -join "`n") -notmatch "CUDAExecutionProvider") {
            throw "GPU OCR preload smoke did not activate CUDAExecutionProvider."
          }
