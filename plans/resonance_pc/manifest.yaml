    parameters:
    - name: region
      type: Any
      required: false
      default: null
    - name: timeout_sec
      type: Any
      required: false
      default: 8.0
    - name: interval_sec
      type: Any
      required: false
      default: 0.2
    - name: stable_scans
      type: Any
      required: false
      default: 2
    - name: move_duration_sec
      type: Any
