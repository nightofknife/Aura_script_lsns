    - name: transition_region
      type: Any
      required: false
      default: null
    - name: transition_timeout_sec
      type: Any
      required: false
      default: 4.0
    - name: transition_min_confidence
      type: Any
      required: false
      default: 0.7
    - name: match_mode
      type: Any
      required: false
      default: contains
