    - name: drag_duration_sec
      type: Any
      required: false
      default: 0.5
    - name: drag_hold_before_release_sec
      type: Any
      required: false
      default: 0.5
    - name: after_drag_sec
      type: Any
      required: false
      default: 0.5
    - name: enter_button_text
      type: Any
      required: false
