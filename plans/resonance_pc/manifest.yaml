    - name: region
      type: Any
      required: false
      default: null
    - name: drag_forward
      type: Any
      required: false
      default: null
    - name: drag_backward
      type: Any
      required: false
      default: null
    - name: max_attempts
      type: Any
      required: false
      default: 12
    - name: drag_duration_sec
      type: Any
      required: false
      default: 0.5
    - name: drag_hold_before_release_sec
      type: Any
      required: false
      default: 0.5
    - name: after_drag_sec
      type: Any
      required: false
      default: 0.5
    - name: enter_button_text
      type: Any
      required: false
      default: 进入挑战
    - name: button_region_left_offset
