    - name: threat_level
      type: Any
      required: true
      default: null
    - name: region
      type: Any
      required: false
      default: null
    - name: drag_increase
      type: Any
      required: false
      default: null
    - name: drag_decrease
      type: Any
      required: false
      default: null
    - name: max_attempts
      type: Any
      required: false
      default: 20
    - name: drag_duration_sec
      type: Any
      required: false
      default: 0.5
    - name: drag_hold_before_release_sec
      type: Any
      required: false
      default: 0.5
    - name: after_drag_sec
      type: Any
      required: false
      default: 0.5
  - name: resonance_pc.select_action_summary_stage
