    function: resonance_pc_select_ordered_city
    public: true
    read_only: false
    timeout: null
    description: Select target city from ordered city list by OCR + directional drag.
    parameters:
    - name: target_city_name
      type: Any
      required: true
      default: null
    - name: city_order
      type: Any
      required: true
      default: null
    - name: region
      type: Any
      required: false
      default: null
    - name: drag_up
      type: Any
      required: false
      default: null
    - name: drag_down
      type: Any
      required: false
      default: null
    - name: max_attempts
      type: Any
      required: false
      default: 15
    - name: drag_duration_sec
      type: Any
      required: false
      default: 0.5
    - name: drag_hold_before_release_sec
      type: Any
      required: false
      default: 0.5
    - name: after_drag_sec
      type: Any
      required: false
      default: 0.5
    - name: match_mode
      type: Any
      required: false
      default: contains
  - name: resonance_pc.select_threat_level_numeric
    module: plans.resonance_pc.src.actions.battle_dispatch_pc_actions
