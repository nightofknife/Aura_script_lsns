    timeout: null
    description: Check whether one pixel color is inside an inclusive RGB range.
    parameters:
    - name: x
      type: Any
      required: true
      default: null
    - name: y
      type: Any
      required: true
      default: null
    - name: rgb_min
      type: Any
      required: true
      default: null
    - name: rgb_max
      type: Any
      required: true
      default: null
