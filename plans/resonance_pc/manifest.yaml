package:
  name: '@plans/resonance_pc'
  version: 0.1.0
  description: Isolated Resonance PC automation plan.
  license: MIT
requires:
  aura: '>=2.0.0'
dependencies:
  '@plans/aura_base':
    version: '>=0.1.0'
    source: local
    path: ../aura_base
pypi-dependencies: {}
exports:
  services:
  - name: resonance_pc_city_shop_data
    module: plans.resonance_pc.src.services.city_shop_data_pc_service
    class: ResonancePcCityShopDataService
    public: true
    singleton: true
    replace: null
    description: Resolve ResonancePc city names and city shop coordinates from static
      data.
  - name: resonance_pc_market_data
    module: plans.resonance_pc.src.services.resonance_pc_market_data_service
    class: ResonancePcMarketDataService
    public: true
    singleton: true
    replace: null
    description: Fetches and normalizes ResonancePc market snapshots with local cache.
  - name: resonance_pc_trade_planner
    module: plans.resonance_pc.src.services.resonance_pc_trade_planner_service
    class: ResonancePcTradePlannerService
    public: true
    singleton: true
    replace: null
    description: ResonancePc exact full-budget trade planner with legacy planning
      helpers.
  actions:
  - name: resonance_pc.group_battle_jobs
    module: plans.resonance_pc.src.actions.battle_dispatch_pc_actions
    function: resonance_pc_group_battle_jobs
    public: true
    read_only: true
    timeout: null
    description: Group auto battle jobs by top-level category and preserve first-seen
      category order.
    parameters:
    - name: jobs
      type: Any
      required: true
      default: null
  - name: resonance_pc.group_ct_jobs
    module: plans.resonance_pc.src.actions.battle_dispatch_pc_actions
    function: resonance_pc_group_ct_jobs
    public: true
    read_only: true
    timeout: null
    description: Group CT jobs into tie_an and regional_ops_center buckets with first-seen
      order.
    parameters:
    - name: jobs
      type: Any
      required: true
      default: null
  - name: resonance_pc.group_gp_jobs
    module: plans.resonance_pc.src.actions.battle_dispatch_pc_actions
    function: resonance_pc_group_gp_jobs
    public: true
    read_only: true
    timeout: null
    description: Group GP jobs into action_summary and structural_exploration buckets
      with first-seen order.
    parameters:
    - name: jobs
      type: Any
      required: true
      default: null
  - name: resonance_pc.group_consecutive_jobs_by_route
    module: plans.resonance_pc.src.actions.battle_dispatch_pc_actions
    function: resonance_pc_group_consecutive_jobs_by_route
    public: true
    read_only: true
    timeout: null
    description: Group adjacent jobs with the same route_id while preserving order.
    parameters:
    - name: jobs
      type: Any
      required: true
      default: null
  - name: resonance_pc.annotate_job_sequence
    module: plans.resonance_pc.src.actions.battle_dispatch_pc_actions
    function: resonance_pc_annotate_job_sequence
    public: true
    read_only: true
    timeout: null
    description: Attach sequence metadata to each job item while preserving original
      fields.
    parameters:
    - name: jobs
      type: Any
      required: true
      default: null
  - name: resonance_pc.normalize_battle_jobs
    module: plans.resonance_pc.src.actions.battle_dispatch_pc_actions
    function: resonance_pc_normalize_battle_jobs
    public: true
    read_only: true
    timeout: null
    description: Normalize battle jobs by dropping route-incompatible residual fields.
    parameters:
    - name: jobs
      type: Any
      required: true
      default: null
  - name: resonance_pc.validate_battle_jobs
    module: plans.resonance_pc.src.actions.battle_dispatch_pc_actions
    function: resonance_pc_validate_battle_jobs
    public: true
    read_only: true
    timeout: null
    description: Validate jobs against battle catalog and normalize required fields.
    parameters:
    - name: jobs
      type: Any
      required: true
      default: null
  - name: resonance_pc.resolve_difficulty_text
    module: plans.resonance_pc.src.actions.battle_dispatch_pc_actions
    function: resonance_pc_resolve_difficulty_text
    public: true
    read_only: true
    timeout: null
    description: Resolve difficulty text from numeric difficulty level.
    parameters:
    - name: difficulty
      type: Any
      required: true
      default: null
  - name: resonance_pc.select_ordered_city
