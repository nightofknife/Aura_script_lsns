auto_battle_ct_tie_an_run_one_pc:
  meta:
    title: Auto Battle PC CT TieAn Run One
    description: Execute one CT tie_an job.
    inputs:
      - name: route_id
        type: string
        required: true
      - name: city_name
        type: string
        required: true
      - name: mission_type
        type: string
        required: true
      - name: stage
        type: number
        required: false
      - name: difficulty
        type: number
        required: false
      - name: formation_index
        type: number
        required: false
      - name: capture_count
        type: number
        required: false
  steps:
    select_city:
      action: resonance_pc.select_ordered_city
      params:
        target_city_name: "{{ inputs.city_name }}"
        city_order:
          - "\u4fee\u683c\u91cc\u57ce"
          - "\u66fc\u5fb7\u77ff\u573a"
          - "7\u53f7\u81ea\u7531\u6e2f"
          - "\u6f84\u660e\u6570\u636e\u4e2d\u5fc3"
          - "\u6d77\u89d2\u57ce"
          - "\u963f\u59ae\u5854\u53d1\u5c04\u4e2d\u5fc3"
          - "\u5c9a\u5fc3\u57ce"
          - "\u8d21\u9732\u57ce"
        region: [45, 80, 255, 550]
        drag_up: [220, 560, 220, 260]
        drag_down: [220, 260, 220, 560]
        max_attempts: 15
        drag_duration_sec: 0.5
        drag_hold_before_release_sec: 0.5
        after_drag_sec: 0.5
        match_mode: "contains"

    wait_after_select_city:
      action: plans/aura_base/sleep
      params:
        seconds: 0.5
      depends_on: select_city

    click_expel_task:
      action: plans/aura_base/find_text_and_click
      params:
        text_to_find: "\u9a71\u9010\u4efb\u52a1"
        region: [100, 650, 300, 40]
        match_mode: "contains"
      depends_on: wait_after_select_city
      when: "{{ inputs.mission_type == 'expel' }}"

    click_bounty_task:
      action: plans/aura_base/find_text_and_click
      params:
        text_to_find: "\u60ac\u8d4f\u4efb\u52a1"
        region: [100, 650, 300, 40]
        match_mode: "contains"
      depends_on: wait_after_select_city
      when: "{{ inputs.mission_type == 'bounty' }}"

    assert_task_type_clicked:
      action: plans/aura_base/assert_condition
      params:
        condition: "{{ (inputs.mission_type == 'expel' and (nodes.click_expel_task.output | default(false))) or (inputs.mission_type == 'bounty' and (nodes.click_bounty_task.output | default(false))) }}"
        message: "failed to select mission type"
      depends_on:
        all:
          - click_expel_task: "success|failed|skipped"
          - click_bounty_task: "success|failed|skipped"

    wait_after_task_type:
      action: plans/aura_base/sleep
      params:
        seconds: 0.5
      depends_on: assert_task_type_clicked

    click_stage_1:
      action: plans/aura_base/click
      params:
        x: 630
        y: 660
      depends_on: wait_after_task_type
      when: "{{ inputs.mission_type == 'expel' and inputs.stage == 1 }}"

    click_stage_2:
      action: plans/aura_base/click
      params:
        x: 900
        y: 660
      depends_on: wait_after_task_type
      when: "{{ inputs.mission_type == 'expel' and inputs.stage == 2 }}"

    click_stage_3:
      action: plans/aura_base/click
      params:
        x: 1100
        y: 660
      depends_on: wait_after_task_type
      when: "{{ inputs.mission_type == 'expel' and inputs.stage == 3 }}"

    stage_selected_marker:
      action: plans/aura_base/log
      params:
        message: "stage selected marker"
      depends_on:
        all:
          - click_stage_1: "success|failed|skipped"
          - click_stage_2: "success|failed|skipped"
          - click_stage_3: "success|failed|skipped"
          - wait_after_task_type: "success"

    click_change_difficulty:
      action: plans/aura_base/find_text_and_click
      params:
        text_to_find: "\u53d8\u66f4\u96be\u5ea6"
        region: [660, 520, 140, 40]
        match_mode: "contains"
      depends_on: stage_selected_marker
      when: "{{ inputs.mission_type == 'expel' and inputs.difficulty is not none }}"

    wait_difficulty_menu:
      action: plans/aura_base/sleep
      params:
        seconds: 0.5
      depends_on:
        click_change_difficulty: "success|skipped"
      when: "{{ inputs.mission_type == 'expel' and inputs.difficulty is not none }}"

    resolve_difficulty_text:
      action: resonance_pc.resolve_difficulty_text
      params:
        difficulty: "{{ inputs.difficulty }}"
      depends_on:
        wait_difficulty_menu: "success|skipped"
      when: "{{ inputs.mission_type == 'expel' and inputs.difficulty is not none }}"

    click_difficulty_text:
      action: plans/aura_base/find_text_and_click
      params:
        text_to_find: "{{ nodes.resolve_difficulty_text.output.difficulty_text }}"
        region: [240, 480, 860, 60]
        match_mode: "contains"
      depends_on: resolve_difficulty_text
      when: "{{ inputs.mission_type == 'expel' and inputs.difficulty is not none }}"

    click_confirm_difficulty:
      action: plans/aura_base/find_text_and_click
      params:
        text_to_find: "\u786e\u8ba4"
        region: [1100, 600, 100, 100]
        match_mode: "contains"
      depends_on: click_difficulty_text
      when: "{{ inputs.mission_type == 'expel' and inputs.difficulty is not none }}"

    click_go_combat_with_difficulty:
      action: plans/aura_base/find_text_and_click
      params:
        text_to_find: "\u524d\u5f80\u4f5c\u6218"
        region: [920, 520, 180, 50]
        match_mode: "contains"
      depends_on: click_confirm_difficulty
      when: "{{ inputs.mission_type == 'expel' and inputs.difficulty is not none }}"

    click_go_combat_without_difficulty:
      action: plans/aura_base/find_text_and_click
      params:
        text_to_find: "\u524d\u5f80\u4f5c\u6218"
        region: [730, 590, 130, 50]
        match_mode: "contains"
      depends_on: stage_selected_marker
      when: "{{ inputs.mission_type == 'bounty' }}"

    run_combat_after_go_combat_with_difficulty:
      action: aura.run_task
      params:
        task_ref: "tasks:auto_battle_combat_pc.yaml:auto_battle_combat_pc"
        inputs:
          formation_index: "{{ inputs.formation_index | default(none) }}"
          capture_count: "{{ inputs.capture_count | default(none) }}"
      depends_on: click_go_combat_with_difficulty
      when: "{{ inputs.mission_type == 'expel' and inputs.difficulty is not none }}"

    run_combat_after_go_combat_without_difficulty:
      action: aura.run_task
      params:
        task_ref: "tasks:auto_battle_combat_pc.yaml:auto_battle_combat_pc"
        inputs:
          formation_index: "{{ inputs.formation_index | default(none) }}"
          capture_count: "{{ inputs.capture_count | default(none) }}"
      depends_on: click_go_combat_without_difficulty
      when: "{{ inputs.mission_type == 'bounty' }}"

  returns:
    success: true
    route_id: "{{ inputs.route_id }}"
    city_name: "{{ inputs.city_name }}"
    mission_type: "{{ inputs.mission_type }}"


auto_battle_ct_tie_an_batch_pc:
  meta:
    title: Auto Battle PC CT TieAn Batch
    description: Batch executor for CT tie_an jobs.
    inputs:
      - name: jobs
        type: list
