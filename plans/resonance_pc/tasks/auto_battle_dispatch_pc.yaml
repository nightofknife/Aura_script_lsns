auto_battle_ct_batch_pc:
  meta:
    title: Auto Battle PC CT Batch
    description: Group CT jobs by tie_an/regional_ops_center and dispatch in order.
    inputs:
      - name: jobs
        type: list
        required: true
        min_items: 1
  steps:
    group_ct_jobs:
      action: resonance_pc.group_ct_jobs
      params:
        jobs: "{{ inputs.jobs }}"

    assert_no_unknown_ct_jobs:
      action: plans/aura_base/assert_condition
      params:
        condition: "{{ (nodes.group_ct_jobs.output.unknown_jobs | length) == 0 }}"
        message: "contains unsupported CT route_id"
      depends_on: group_ct_jobs

    prepare_ct_category_order:
      action: plans/aura_base/log
      params:
        message: "prepare CT category order"
      depends_on: assert_no_unknown_ct_jobs
      outputs:
        first_category: "{{ (nodes.group_ct_jobs.output.category_order | first) if (nodes.group_ct_jobs.output.category_order | length) > 0 else '' }}"
        second_category: "{{ nodes.group_ct_jobs.output.category_order[1] if (nodes.group_ct_jobs.output.category_order | length) > 1 else '' }}"

    switch_first_tie_an:
      action: plans/aura_base/wait_for_text
      params:
        text_to_find: "\u94c1\u5b89\u5c40"
        region: [670, 370, 530, 50]
        match_mode: "contains"
        timeout: 3.0
        interval: 0.5
      depends_on: prepare_ct_category_order
      when: "{{ nodes.prepare_ct_category_order.first_category == 'tie_an' }}"

    click_first_tie_an:
      action: plans/aura_base/find_text_and_click
      params:
        text_to_find: "\u94c1\u5b89\u5c40"
        region: [670, 370, 530, 50]
        match_mode: "contains"
      depends_on: switch_first_tie_an
      when: "{{ nodes.prepare_ct_category_order.first_category == 'tie_an' }}"

    switch_first_regional_ops:
      action: plans/aura_base/find_text_and_click
      params:
        text_to_find: "\u533a\u57df\u4f5c\u6218\u4e2d\u5fc3"
        region: [670, 370, 530, 50]
        match_mode: "contains"
      depends_on: prepare_ct_category_order
      when: "{{ nodes.prepare_ct_category_order.first_category == 'regional_ops_center' }}"

    wait_after_first_tie_an_switch:
      action: plans/aura_base/sleep
      params:
        seconds: 2.0
      depends_on: click_first_tie_an
      when: "{{ nodes.prepare_ct_category_order.first_category == 'tie_an' }}"

    wait_after_first_regional_ops_switch:
      action: plans/aura_base/sleep
      params:
        seconds: 2.0
      depends_on: switch_first_regional_ops
      when: "{{ nodes.prepare_ct_category_order.first_category == 'regional_ops_center' }}"

    run_first_tie_an_batch:
      action: aura.run_task
      params:
        task_ref: "tasks:auto_battle_dispatch_pc.yaml:auto_battle_ct_tie_an_batch_pc"
        inputs:
          jobs: "{{ nodes.group_ct_jobs.output.tie_an_jobs }}"
      depends_on: wait_after_first_tie_an_switch
      when: "{{ nodes.prepare_ct_category_order.first_category == 'tie_an' and (nodes.group_ct_jobs.output.tie_an_jobs | length) > 0 }}"

    run_first_regional_ops_batch:
      action: aura.run_task
      params:
        task_ref: "tasks:auto_battle_dispatch_pc.yaml:auto_battle_ct_regional_ops_batch_pc"
        inputs:
          jobs: "{{ nodes.group_ct_jobs.output.regional_ops_jobs }}"
      depends_on: wait_after_first_regional_ops_switch
      when: "{{ nodes.prepare_ct_category_order.first_category == 'regional_ops_center' and (nodes.group_ct_jobs.output.regional_ops_jobs | length) > 0 }}"

    click_back_after_first_batch:
      action: plans/aura_base/click
      params:
        x: 90
        y: 40
      depends_on:
        all:
          - run_first_tie_an_batch: "success|failed|skipped"
          - run_first_regional_ops_batch: "success|failed|skipped"
      when: "{{ nodes.prepare_ct_category_order.second_category != '' }}"

    wait_after_back_first_batch:
      action: plans/aura_base/sleep
      params:
        seconds: 1.0
      depends_on: click_back_after_first_batch
      when: "{{ nodes.prepare_ct_category_order.second_category != '' }}"

    switch_second_tie_an:
      action: plans/aura_base/wait_for_text
      params:
        text_to_find: "\u94c1\u5b89\u5c40"
        region: [670, 370, 530, 50]
        match_mode: "contains"
        timeout: 3.0
        interval: 0.5
      depends_on: wait_after_back_first_batch
      when: "{{ nodes.prepare_ct_category_order.second_category == 'tie_an' }}"

    click_second_tie_an:
      action: plans/aura_base/find_text_and_click
      params:
        text_to_find: "\u94c1\u5b89\u5c40"
        region: [670, 370, 530, 50]
        match_mode: "contains"
      depends_on: switch_second_tie_an
      when: "{{ nodes.prepare_ct_category_order.second_category == 'tie_an' }}"

    switch_second_regional_ops:
      action: plans/aura_base/find_text_and_click
      params:
        text_to_find: "\u533a\u57df\u4f5c\u6218\u4e2d\u5fc3"
        region: [670, 370, 530, 50]
        match_mode: "contains"
      depends_on: wait_after_back_first_batch
      when: "{{ nodes.prepare_ct_category_order.second_category == 'regional_ops_center' }}"

    wait_after_second_tie_an_switch:
      action: plans/aura_base/sleep
      params:
        seconds: 2.0
      depends_on: click_second_tie_an
      when: "{{ nodes.prepare_ct_category_order.second_category == 'tie_an' }}"

    wait_after_second_regional_ops_switch:
      action: plans/aura_base/sleep
      params:
        seconds: 2.0
      depends_on: switch_second_regional_ops
      when: "{{ nodes.prepare_ct_category_order.second_category == 'regional_ops_center' }}"

    run_second_tie_an_batch:
      action: aura.run_task
      params:
        task_ref: "tasks:auto_battle_dispatch_pc.yaml:auto_battle_ct_tie_an_batch_pc"
        inputs:
          jobs: "{{ nodes.group_ct_jobs.output.tie_an_jobs }}"
      depends_on: wait_after_second_tie_an_switch
      when: "{{ nodes.prepare_ct_category_order.second_category == 'tie_an' and (nodes.group_ct_jobs.output.tie_an_jobs | length) > 0 }}"

    run_second_regional_ops_batch:
      action: aura.run_task
      params:
        task_ref: "tasks:auto_battle_dispatch_pc.yaml:auto_battle_ct_regional_ops_batch_pc"
        inputs:
          jobs: "{{ nodes.group_ct_jobs.output.regional_ops_jobs }}"
      depends_on: wait_after_second_regional_ops_switch
      when: "{{ nodes.prepare_ct_category_order.second_category == 'regional_ops_center' and (nodes.group_ct_jobs.output.regional_ops_jobs | length) > 0 }}"

    click_back_after_single_batch:
      action: plans/aura_base/click
      params:
        x: 90
        y: 40
      depends_on:
        all:
          - run_first_tie_an_batch: "success|failed|skipped"
          - run_first_regional_ops_batch: "success|failed|skipped"
      when: "{{ nodes.prepare_ct_category_order.first_category != '' and nodes.prepare_ct_category_order.second_category == '' }}"

    click_back_after_second_batch:
      action: plans/aura_base/click
      params:
        x: 90
        y: 40
      depends_on:
        all:
          - run_second_tie_an_batch: "success|failed|skipped"
          - run_second_regional_ops_batch: "success|failed|skipped"
      when: "{{ nodes.prepare_ct_category_order.second_category != '' }}"

  returns:
    success: true
    category: "ct"
    sub_category_order: "{{ nodes.group_ct_jobs.output.category_order }}"
    tie_an_job_count: "{{ nodes.group_ct_jobs.output.tie_an_jobs | length }}"
    regional_ops_job_count: "{{ nodes.group_ct_jobs.output.regional_ops_jobs | length }}"


