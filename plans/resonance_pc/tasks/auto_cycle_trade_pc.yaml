auto_cycle_trade_pc:
  meta:
    title: Auto Cycle Trade (PC)
    description: PC variant of the automatic cycle trade flow.
    entry_point: true
    inputs:
      - name: fatigue_budget
        type: number
        required: true
      - name: cargo_capacity
        type: number
        required: false
        default: 650
      - name: book_budget
        type: number
        required: false
        default: 0
      - name: book_profit_threshold
        type: number
        required: false
        default: 0
      - name: max_cycle_hops
        type: number
        required: false
        default: 6
      - name: max_rounds
        type: number
        required: false
        default: 64
      - name: use_fatigue_medicine
        type: boolean
        required: false
        default: false
      - name: allowed_fatigue_medicines
        type: list
        required: false
        default: []
      - name: fatigue_medicine_max_uses
        type: number
        required: false
        default: 4
  steps:
    run:
      action: resonance_pc.auto_cycle_trade_flow
      params:
        fatigue_budget: "{{ inputs.fatigue_budget }}"
        cargo_capacity: "{{ inputs.cargo_capacity }}"
        book_budget: "{{ inputs.book_budget }}"
        book_profit_threshold: "{{ inputs.book_profit_threshold }}"
        max_cycle_hops: "{{ inputs.max_cycle_hops }}"
        max_rounds: "{{ inputs.max_rounds }}"
        use_fatigue_medicine: "{{ inputs.use_fatigue_medicine | default(false) }}"
        allowed_fatigue_medicines: "{{ inputs.allowed_fatigue_medicines | default([]) }}"
        fatigue_medicine_max_uses: "{{ inputs.fatigue_medicine_max_uses | default(4) }}"
  returns:
    success: "{{ nodes.run.output.success }}"
    status: "{{ nodes.run.output.status }}"
    reason: "{{ nodes.run.output.reason }}"
    snapshot_id: "{{ nodes.run.output.snapshot_id }}"
    snapshot_ids: "{{ nodes.run.output.snapshot_ids }}"
    expected_profit: "{{ nodes.run.output.expected_profit }}"
    fatigue_budget: "{{ nodes.run.output.fatigue_budget }}"
    fatigue_used: "{{ nodes.run.output.fatigue_used }}"
    remaining_fatigue: "{{ nodes.run.output.remaining_fatigue }}"
    books_budget: "{{ nodes.run.output.books_budget }}"
    books_used: "{{ nodes.run.output.books_used }}"
    rounds_completed: "{{ nodes.run.output.rounds_completed }}"
    entry_route_count: "{{ nodes.run.output.entry_route_count }}"
    city_cycle: "{{ nodes.run.output.city_cycle }}"
    rounds: "{{ nodes.run.output.rounds }}"
    route: "{{ nodes.run.output.route }}"
    blocked_at: "{{ nodes.run.output.blocked_at }}"
    blocked_leg: "{{ nodes.run.output.blocked_leg }}"
    fatigue_medicine_used: "{{ nodes.run.output.fatigue_medicine_used }}"
    fatigue_medicine_use_count: "{{ nodes.run.output.fatigue_medicine_use_count }}"
    initial_city: "{{ nodes.run.output.initial_city }}"
    rounds_run: "{{ nodes.run.output.rounds_run }}"
    page_state: "{{ nodes.run.output.page_state }}"
