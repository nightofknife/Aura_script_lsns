package:
  name: '@plans/resonance'
  version: 0.1.0
  description: ''
  license: MIT
requires:
  aura: '>=2.0.0'
dependencies:
  '@plans/aura_base':
    version: '>=0.1.0'
    source: local
    path: ../aura_base
pypi-dependencies: {}
exports:
  services:
  - name: resonance_city_shop_data
    module: plans.resonance.src.services.city_shop_data_service
    class: CityShopDataService
    public: true
    singleton: true
    replace: null
    description: Resolve Resonance city names and city shop coordinates from static
      data.
  - name: resonance_market_data
    module: plans.resonance.src.services.resonance_market_data_service
    class: ResonanceMarketDataService
    public: true
    singleton: true
    replace: null
    description: Fetches and normalizes Resonance market snapshots with local cache.
  - name: resonance_trade_planner
    module: plans.resonance.src.services.resonance_trade_planner_service
    class: ResonanceTradePlannerService
    public: true
    singleton: true
    replace: null
    description: Resonance rolling trade planner based on fatigue/book/cargo constraints.
  actions:
  - name: resonance.group_battle_jobs
    module: plans.resonance.src.actions.battle_dispatch_actions
    function: resonance_group_battle_jobs
    public: true
    read_only: true
    timeout: null
    description: Group auto battle jobs by top-level category and preserve first-seen
      category order.
    parameters:
    - name: jobs
      type: Any
      required: true
      default: null
  - name: resonance.group_ct_jobs
    module: plans.resonance.src.actions.battle_dispatch_actions
    function: resonance_group_ct_jobs
    public: true
    read_only: true
    timeout: null
    description: Group CT jobs into tie_an and regional_ops_center buckets with first-seen
      order.
    parameters:
    - name: jobs
      type: Any
      required: true
      default: null
  - name: resonance.group_gp_jobs
    module: plans.resonance.src.actions.battle_dispatch_actions
    function: resonance_group_gp_jobs
    public: true
    read_only: true
    timeout: null
    description: Group GP jobs into action_summary and structural_exploration buckets
      with first-seen order.
    parameters:
    - name: jobs
      type: Any
      required: true
      default: null
  - name: resonance.group_consecutive_jobs_by_route
    module: plans.resonance.src.actions.battle_dispatch_actions
    function: resonance_group_consecutive_jobs_by_route
    public: true
    read_only: true
    timeout: null
    description: Group adjacent jobs with the same route_id while preserving order.
    parameters:
    - name: jobs
      type: Any
      required: true
      default: null
  - name: resonance.annotate_job_sequence
    module: plans.resonance.src.actions.battle_dispatch_actions
    function: resonance_annotate_job_sequence
    public: true
    read_only: true
    timeout: null
    description: Attach sequence metadata to each job item while preserving original
      fields.
    parameters:
    - name: jobs
      type: Any
      required: true
      default: null
  - name: resonance.normalize_battle_jobs
    module: plans.resonance.src.actions.battle_dispatch_actions
    function: resonance_normalize_battle_jobs
    public: true
    read_only: true
    timeout: null
    description: Normalize battle jobs by dropping route-incompatible residual fields.
    parameters:
    - name: jobs
      type: Any
      required: true
      default: null
  - name: resonance.validate_battle_jobs
    module: plans.resonance.src.actions.battle_dispatch_actions
    function: resonance_validate_battle_jobs
    public: true
    read_only: true
    timeout: null
    description: Validate jobs against battle catalog and normalize required fields.
    parameters:
    - name: jobs
      type: Any
      required: true
      default: null
  - name: resonance.resolve_difficulty_text
    module: plans.resonance.src.actions.battle_dispatch_actions
    function: resonance_resolve_difficulty_text
    public: true
    read_only: true
    timeout: null
    description: Resolve difficulty text from numeric difficulty level.
    parameters:
    - name: difficulty
      type: Any
      required: true
      default: null
  - name: resonance.select_ordered_city
    module: plans.resonance.src.actions.battle_dispatch_actions
    function: resonance_select_ordered_city
    public: true
    read_only: false
    timeout: null
    description: Select target city from ordered city list by OCR + directional drag.
    parameters:
    - name: target_city_name
      type: Any
      required: true
      default: null
    - name: city_order
      type: Any
      required: true
      default: null
    - name: region
      type: Any
      required: false
      default: null
    - name: drag_up
      type: Any
      required: false
      default: null
    - name: drag_down
      type: Any
      required: false
      default: null
    - name: max_attempts
      type: Any
      required: false
      default: 15
    - name: drag_duration_sec
      type: Any
      required: false
      default: 0.5
    - name: after_drag_sec
      type: Any
      required: false
      default: 0.5
    - name: match_mode
      type: Any
      required: false
      default: contains
  - name: resonance.select_threat_level_numeric
    module: plans.resonance.src.actions.battle_dispatch_actions
    function: resonance_select_threat_level_numeric
    public: true
    read_only: false
    timeout: null
    description: Select threat level by OCR numeric scan and directional horizontal
      drag.
    parameters:
    - name: threat_level
      type: Any
      required: true
      default: null
    - name: region
      type: Any
      required: false
      default: null
    - name: drag_increase
      type: Any
      required: false
      default: null
    - name: drag_decrease
      type: Any
      required: false
      default: null
    - name: max_attempts
      type: Any
      required: false
      default: 20
    - name: drag_duration_sec
      type: Any
      required: false
      default: 0.5
    - name: after_drag_sec
      type: Any
      required: false
      default: 0.5
  - name: resonance.select_action_summary_stage
    module: plans.resonance.src.actions.battle_dispatch_actions
    function: resonance_select_action_summary_stage
    public: true
    read_only: false
    timeout: null
    description: Select one action_summary stage by OCR + horizontal directional drag,
      then click with offset.
    parameters:
    - name: route_id
      type: Any
      required: true
      default: null
    - name: region
      type: Any
      required: false
      default: null
    - name: drag_forward
      type: Any
      required: false
      default: null
    - name: drag_backward
      type: Any
      required: false
      default: null
    - name: max_attempts
      type: Any
      required: false
      default: 12
    - name: drag_duration_sec
      type: Any
      required: false
      default: 0.5
    - name: after_drag_sec
      type: Any
      required: false
      default: 0.5
    - name: click_offset_x
      type: Any
      required: false
      default: 0
    - name: click_offset_y
      type: Any
      required: false
      default: 180
    - name: match_mode
      type: Any
      required: false
      default: contains
  - name: resonance.check_pixel_color_range
    module: plans.resonance.src.actions.battle_dispatch_actions
    function: resonance_check_pixel_color_range
    public: true
    read_only: true
    timeout: null
    description: Check whether one pixel color is inside an inclusive RGB range.
    parameters:
    - name: x
      type: Any
      required: true
      default: null
    - name: y
      type: Any
      required: true
      default: null
    - name: rgb_min
      type: Any
      required: true
      default: null
    - name: rgb_max
      type: Any
      required: true
      default: null
  - name: resonance.reconcile_structural_selection
    module: plans.resonance.src.actions.battle_dispatch_actions
    function: resonance_reconcile_structural_selection
    public: true
    read_only: false
    timeout: null
    description: Reconcile all structural targets so only the current job target remains
      selected.
    parameters:
    - name: route_id
      type: Any
      required: false
      default: null
    - name: gp_stage_name
      type: Any
      required: false
      default: null
    - name: region
      type: Any
      required: false
      default: null
    - name: rgb_min
      type: Any
      required: false
      default: null
    - name: rgb_max
      type: Any
      required: false
      default: null
    - name: match_mode
      type: Any
      required: false
      default: contains
    - name: after_click_sec
      type: Any
      required: false
      default: 0.3
  - name: resonance.wait_and_click_any_text
    module: plans.resonance.src.actions.battle_dispatch_actions
    function: resonance_wait_and_click_any_text
    public: true
    read_only: false
    timeout: null
    description: Continuously OCR a region until any target text is found, then click
      its center.
    parameters:
    - name: targets
      type: Any
      required: true
      default: null
    - name: region
      type: Any
      required: false
      default: null
    - name: timeout_sec
      type: Any
      required: false
      default: 10.0
    - name: interval_sec
      type: Any
      required: false
      default: 0.5
    - name: match_mode
      type: Any
      required: false
      default: contains
  - name: resonance.run_battle_resolution
    module: plans.resonance.src.actions.battle_dispatch_actions
    function: resonance_run_battle_resolution
    public: true
    read_only: false
    timeout: null
    description: Resolve in-battle next-step/capture branch by OCR polling.
    parameters:
    - name: capture_count
      type: Any
      required: false
      default: null
    - name: battle_poll_region
      type: Any
      required: false
      default: null
    - name: confirm_region
      type: Any
      required: false
      default: null
    - name: exit_hint_region
      type: Any
      required: false
      default: null
    - name: confirm_click_point
      type: Any
      required: false
      default: null
    - name: poll_interval_sec
      type: Any
      required: false
      default: 5.0
    - name: timeout_sec
      type: Any
      required: false
      default: 600.0
    - name: confirm_timeout_sec
      type: Any
      required: false
      default: 30.0
    - name: exit_hint_timeout_sec
      type: Any
      required: false
      default: 30.0
    - name: short_interval_sec
      type: Any
      required: false
      default: 0.5
    - name: match_mode
      type: Any
      required: false
      default: contains
  - name: resonance.resolve_city_shop_point
    module: plans.resonance.src.actions.city_shop_actions
    function: resonance_resolve_city_shop_point
    public: true
    read_only: true
    timeout: null
    description: Resolve city+shop point from OCR text and location.json.
    parameters:
    - name: ocr_city_text
      type: Any
      required: true
      default: null
    - name: shop_type
      type: Any
      required: true
      default: null
    - name: location_file_path
      type: Any
      required: true
      default: null
  - name: resonance.open_city_panel_from_main
    module: plans.resonance.src.actions.city_trade_flow_actions
    function: resonance_open_city_panel_from_main
    public: true
    read_only: false
    timeout: null
    description: Open the city panel from the city main screen by clicking 访问城市/访问地区.
    parameters:
    - name: timeout_sec
      type: Any
      required: false
      default: 12.0
    - name: settle_sec
      type: Any
      required: false
      default: 3.0
  - name: resonance.tap_back_once
    module: plans.resonance.src.actions.city_trade_flow_actions
    function: resonance_tap_back_once
    public: true
    read_only: false
    timeout: null
    description: Tap the top-left back button once.
    parameters:
    - name: wait_sec
      type: Any
      required: false
      default: 1.0
  - name: resonance.go_city_main_direct
    module: plans.resonance.src.actions.city_trade_flow_actions
    function: resonance_go_city_main_direct
    public: true
    read_only: false
    timeout: null
    description: Tap the top-left direct city-main button.
    parameters:
    - name: wait_sec
      type: Any
      required: false
      default: 2.0
  - name: resonance.read_city_name_on_city_panel
    module: plans.resonance.src.actions.city_trade_flow_actions
    function: resonance_read_city_name_on_city_panel
    public: true
    read_only: false
    timeout: null
    description: Read and resolve current city name on the city panel. This action
      does not click.
    parameters:
    - name: location_file_path
      type: Any
      required: false
      default: data/meta/location_mumu.json
  - name: resonance.click_city_shop_by_name
    module: plans.resonance.src.actions.city_trade_flow_actions
    function: resonance_click_city_shop_by_name
    public: true
    read_only: false
    timeout: null
    description: Click a city shop by resolved city name and shop name from the city
      panel.
    parameters:
    - name: city_name
      type: Any
      required: true
      default: null
    - name: shop_name
      type: Any
      required: true
      default: null
    - name: location_file_path
      type: Any
      required: false
      default: data/meta/location_mumu.json
    - name: wait_sec
      type: Any
      required: false
      default: 1.0
  - name: resonance.click_shop_menu_node
    module: plans.resonance.src.actions.city_trade_flow_actions
    function: resonance_click_shop_menu_node
    public: true
    read_only: false
    timeout: null
    description: Click the Nth node in a shop page using fixed MuMu coordinates.
    parameters:
    - name: node_index
      type: Any
      required: true
      default: null
    - name: wait_sec
      type: Any
      required: false
      default: 1.0
  - name: resonance.buy_goods_on_buy_page
    module: plans.resonance.src.actions.city_trade_flow_actions
    function: resonance_buy_goods_on_buy_page
    public: true
    read_only: false
    timeout: null
    description: Complete the buy-goods flow from the 我要买 page and return to the shop
      page.
    parameters:
    - name: product_list
      type: Any
      required: false
      default: null
    - name: books_used
      type: Any
      required: false
      default: 0
    - name: max_scan_rounds
      type: Any
      required: false
      default: 6
  - name: resonance.sell_goods_on_sell_page
    module: plans.resonance.src.actions.city_trade_flow_actions
    function: resonance_sell_goods_on_sell_page
    public: true
    read_only: false
    timeout: null
    description: Complete the sell-all flow from the 我要卖 page and return to the shop
      page.
    parameters: []
  - name: resonance.auto_cycle_trade_flow
    module: plans.resonance.src.actions.city_trade_flow_actions
    function: resonance_auto_cycle_trade_flow
    public: true
    read_only: false
    timeout: null
    description: Run the full Resonance auto-cycle trade flow from city-main UI.
    parameters:
    - name: fatigue_budget
      type: Any
      required: true
      default: null
    - name: cargo_capacity
      type: Any
      required: false
      default: 650
    - name: book_budget
      type: Any
      required: false
      default: 0
    - name: book_profit_threshold
      type: Any
      required: false
      default: 0
    - name: max_cycle_hops
      type: Any
      required: false
      default: 6
    - name: max_rounds
      type: Any
      required: false
      default: 64
    - name: use_fatigue_medicine
      type: Any
      required: false
      default: false
    - name: allowed_fatigue_medicines
      type: Any
      required: false
      default: null
    - name: fatigue_medicine_max_uses
      type: Any
      required: false
      default: 4
  - name: resonance.select_intercity_destination
    module: plans.resonance.src.actions.city_travel_actions
    function: resonance_select_intercity_destination
    public: true
    read_only: false
    timeout: null
    description: Select destination city in intercity view via OCR + directional drag.
    parameters:
    - name: to_city_name
      type: Any
      required: true
      default: null
    - name: location_file_path
      type: Any
      required: false
      default: data/meta/location.json
    - name: city_search_region
      type: Any
      required: false
      default: null
    - name: drag_center
      type: Any
      required: false
      default: null
    - name: drag_span_px
      type: Any
      required: false
      default: 600
    - name: max_search_steps
      type: Any
      required: false
      default: 12
    - name: fallback_enabled
      type: Any
      required: false
      default: true
    - name: target_match_mode
      type: Any
      required: false
      default: contains
    - name: click_y_offset
      type: Any
      required: false
      default: -15
    - name: drag_duration_sec
      type: Any
      required: false
      default: 1.0
    - name: drag_hold_sec
      type: Any
      required: false
      default: 0.5
  - name: resonance.intercity_depart_and_wait
    module: plans.resonance.src.actions.city_travel_actions
    function: resonance_intercity_depart_and_wait
    public: true
    read_only: false
    timeout: null
    description: Enter intercity view, select destination, handle fatigue recovery,
      depart and wait for arrival.
    parameters:
    - name: to_city_name
      type: Any
      required: true
      default: null
    - name: enter_station_timeout_seconds
      type: Any
      required: false
      default: 0
    - name: location_file_path
      type: Any
      required: false
      default: data/meta/location.json
    - name: city_search_region
      type: Any
      required: false
      default: null
    - name: drag_center
      type: Any
      required: false
      default: null
    - name: drag_span_px
      type: Any
      required: false
      default: 600
    - name: max_search_steps
      type: Any
      required: false
      default: 12
    - name: fallback_enabled
      type: Any
      required: false
      default: true
    - name: target_match_mode
      type: Any
      required: false
      default: contains
    - name: click_y_offset
      type: Any
      required: false
      default: -15
    - name: drag_duration_sec
      type: Any
      required: false
      default: 1.0
    - name: drag_hold_sec
      type: Any
      required: false
      default: 0.5
    - name: use_fatigue_medicine
      type: Any
      required: false
      default: false
    - name: allowed_fatigue_medicines
      type: Any
      required: false
      default: null
    - name: fatigue_medicine_max_uses
      type: Any
      required: false
      default: 4
    - name: medicine_button_threshold
      type: Any
      required: false
      default: 0.95
  - name: resonance.wait_intercity_arrival
    module: plans.resonance.src.actions.city_travel_actions
    function: resonance_wait_intercity_arrival
    public: true
    read_only: false
    timeout: null
    description: Wait for intercity arrival and handle trade-travel encounter screens
      within the travel task.
    parameters:
    - name: timeout_sec
      type: Any
      required: false
      default: 600.0
    - name: interval_sec
      type: Any
      required: false
      default: 3.0
    - name: region
      type: Any
      required: false
      default: null
    - name: arrival_text
      type: Any
      required: false
      default: 进入站点
    - name: encounter_policy
      type: Any
      required: false
      default: fight
    - name: max_encounter_actions
      type: Any
      required: false
      default: 3
    - name: post_action_sec
      type: Any
      required: false
      default: 1.0
  - name: resonance.market_refresh
    module: plans.resonance.src.actions.market_data_actions
    function: resonance_market_refresh
    public: true
    read_only: false
    timeout: null
    description: Refresh Resonance market snapshot.
    parameters:
    - name: force
      type: Any
      required: false
      default: false
  - name: resonance.market_sync_web_constants
    module: plans.resonance.src.actions.market_data_actions
    function: resonance_market_sync_web_constants
    public: true
    read_only: false
    timeout: null
    description: Sync route constants (cities/fatigue) from webpage and optionally
      sync buy_lot.
    parameters:
    - name: sync_buy_lot
      type: Any
      required: false
      default: true
  - name: resonance.market_get_latest
    module: plans.resonance.src.actions.market_data_actions
    function: resonance_market_get_latest
    public: true
    read_only: true
    timeout: null
    description: Get latest Resonance market snapshot.
    parameters: []
  - name: resonance.market_get_snapshot
    module: plans.resonance.src.actions.market_data_actions
    function: resonance_market_get_snapshot
    public: true
    read_only: true
    timeout: null
    description: Get Resonance market snapshot by id.
    parameters:
    - name: snapshot_id
      type: Any
      required: true
      default: null
  - name: resonance.market_list_snapshots
    module: plans.resonance.src.actions.market_data_actions
    function: resonance_market_list_snapshots
    public: true
    read_only: true
    timeout: null
    description: List cached Resonance market snapshots.
    parameters:
    - name: limit
      type: Any
      required: false
      default: 50
  - name: resonance.market_query_products
    module: plans.resonance.src.actions.market_data_actions
    function: resonance_market_query_products
    public: true
    read_only: true
    timeout: null
    description: Query normalized products from latest Resonance snapshot.
    parameters:
    - name: scope
      type: Any
      required: false
      default: null
    - name: city_id
      type: Any
      required: false
      default: null
    - name: side
      type: Any
      required: false
      default: null
  - name: resonance.player_data_refresh
    module: plans.resonance.src.actions.player_data_actions
    function: resonance_player_data_refresh
    public: true
    read_only: false
    timeout: 180
    description: Refresh Resonance profile, currencies, clarity, fatigue, cargo and
      recovery options.
    parameters:
    - name: persist
      type: Any
      required: false
      default: true
    - name: enter_main_first
      type: Any
      required: false
      default: true
  - name: resonance.player_data_get_latest
    module: plans.resonance.src.actions.player_data_actions
    function: resonance_player_data_get_latest
    public: true
    read_only: true
    timeout: null
    description: Get latest cached Resonance player data.
    parameters: []
  - name: resonance.use_purchase_books
    module: plans.resonance.src.actions.purchase_book_actions
    function: resonance_use_purchase_books
    public: true
    read_only: false
    timeout: null
    description: Use 进货采买书 before selecting products on the buy-goods page.
    parameters:
    - name: books_used
      type: Any
      required: true
      default: null
    - name: item_name
      type: Any
      required: false
      default: 进货采买书
    - name: max_books_per_purchase
      type: Any
      required: false
      default: 10
    - name: open_timeout_sec
      type: Any
      required: false
      default: 3.0
    - name: dialog_timeout_sec
      type: Any
      required: false
      default: 3.0
    - name: click_interval_sec
      type: Any
      required: false
      default: 0.2
  - name: resonance.detect_startup_state
    module: plans.resonance.src.actions.startup_actions
    function: resonance_detect_startup_state
    public: true
    read_only: true
    timeout: null
    description: Detect Resonance startup/main/title/interior state with one OCR pass.
    parameters:
    - name: region
      type: Any
      required: false
      default: null
  - name: resonance.enter_main
    module: plans.resonance.src.actions.startup_actions
    function: resonance_enter_main
    public: true
    read_only: false
    timeout: 900
    description: Launch or resume Resonance and settle on the main screen with an
      internal polling loop.
    parameters:
    - name: launch_from_home
      type: Any
      required: false
      default: true
    - name: max_settle_rounds
      type: Any
      required: false
      default: 300
    - name: round_interval_sec
      type: Any
      required: false
      default: 1.0
    - name: main_stable_sec
      type: Any
      required: false
      default: 3.0
    - name: fail_if_login_required
      type: Any
      required: false
      default: true
    - name: android_package
      type: Any
      required: false
      default: com.hermes.goda
    - name: click_x
