buy_goods:
  meta:
    title: Buy Goods
    description: Thin task wrapper for resonance.buy_goods_on_buy_page.
    entry_point: true
    inputs:
      - name: product_list
        type: list
        required: true
        min_items: 1
      - name: books_used
        type: number
        required: false
        default: 0
  steps:
    run:
      action: resonance.buy_goods_on_buy_page
      params:
        product_list: "{{ inputs.product_list }}"
        books_used: "{{ inputs.books_used | default(0) }}"
  returns:
    success: "{{ nodes.run.output.success }}"
    page_state: "{{ nodes.run.output.page_state }}"
    selected_products: "{{ nodes.run.output.selected_products }}"
    missing_products: "{{ nodes.run.output.missing_products }}"
    books_requested: "{{ nodes.run.output.books_requested }}"
    book_result: "{{ nodes.run.output.book_result }}"
    settlement: "{{ nodes.run.output.settlement }}"
