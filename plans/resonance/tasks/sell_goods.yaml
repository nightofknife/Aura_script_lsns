sell_all_goods:
  meta:
    title: Sell All Goods
    description: Thin task wrapper for resonance.sell_goods_on_sell_page.
    entry_point: true
  steps:
    run:
      action: resonance.sell_goods_on_sell_page
      params: {}
  returns:
    success: "{{ nodes.run.output.success }}"
    page_state: "{{ nodes.run.output.page_state }}"
    sold_confirmed: "{{ nodes.run.output.sold_confirmed }}"
    sell_result: "{{ nodes.run.output.sell_result }}"
    settlement: "{{ nodes.run.output.settlement }}"
