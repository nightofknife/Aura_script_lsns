click_city_shop_by_name:
  meta:
    title: Click City Shop By Name
    description: Thin wrapper for resonance.click_city_shop_by_name.
    entry_point: true
    inputs:
      - name: city_name
        type: string
        required: true
      - name: shop_name
        type: string
        required: true
  steps:
    run:
      action: resonance.click_city_shop_by_name
      params:
        city_name: "{{ inputs.city_name }}"
        shop_name: "{{ inputs.shop_name }}"
  returns:
    success: "{{ nodes.run.output.success }}"
    page_state: "{{ nodes.run.output.page_state }}"
    click: "{{ nodes.run.output.click }}"

click_shop_menu_node:
  meta:
    title: Click Shop Menu Node
    description: Thin wrapper for resonance.click_shop_menu_node.
    entry_point: true
    inputs:
      - name: node_index
        type: number
        required: true
  steps:
    run:
      action: resonance.click_shop_menu_node
      params:
        node_index: "{{ inputs.node_index }}"
  returns:
    success: "{{ nodes.run.output.success }}"
    page_state: "{{ nodes.run.output.page_state }}"
    node_index: "{{ nodes.run.output.node_index }}"
    x: "{{ nodes.run.output.x }}"
    y: "{{ nodes.run.output.y }}"
