read_city_name_on_city_panel:
  meta:
    title: Read City Name On City Panel
    description: Thin wrapper for resonance.read_city_name_on_city_panel.
    entry_point: true
    inputs: []
  steps:
    run:
      action: resonance.read_city_name_on_city_panel
      params: {}
  returns:
