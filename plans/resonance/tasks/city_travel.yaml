intercity_select_destination:
  meta:
    title: Intercity Select Destination
    description: 点击启程并选择目标城市，然后前往并进入站点。
    entry_point: true
    inputs:
      - name: to_city_name
        type: string
        required: true
      - name: enter_station_timeout_seconds
        type: number
        required: false
        default: 0
      - name: use_fatigue_medicine
        type: boolean
        required: false
        default: false
      - name: allowed_fatigue_medicines
        type: list
        required: false
        default: []
      - name: fatigue_medicine_max_uses
        type: number
        required: false
        default: 4

  steps:
    depart_and_wait:
      action: resonance.intercity_depart_and_wait
      params:
        to_city_name: "{{ inputs.to_city_name }}"
        enter_station_timeout_seconds: "{{ inputs.enter_station_timeout_seconds }}"
        # MuMu emulator coordinates live in location_mumu.json; keep location.json for PC.
        location_file_path: "data/meta/location_mumu.json"
        city_search_region: [130, 70, 1000, 550]
        drag_center: [640, 360]
        drag_span_px: 450
        max_search_steps: 12
        fallback_enabled: true
        target_match_mode: "contains"
        click_y_offset: -15
        drag_duration_sec: 1.0
        drag_hold_sec: 0.5
        use_fatigue_medicine: "{{ inputs.use_fatigue_medicine | default(false) }}"
        allowed_fatigue_medicines: "{{ inputs.allowed_fatigue_medicines | default([]) }}"
        fatigue_medicine_max_uses: "{{ inputs.fatigue_medicine_max_uses | default(4) }}"

  returns:
    success: "{{ nodes.depart_and_wait.output.success }}"
    status: "{{ nodes.depart_and_wait.output.status }}"
    reason: "{{ nodes.depart_and_wait.output.reason }}"
    blocked_at: "{{ nodes.depart_and_wait.output.blocked_at }}"
    to_city_name: "{{ nodes.depart_and_wait.output.to_city_name }}"
    to_city_key: "{{ nodes.depart_and_wait.output.to_city_key }}"
    selected_point: "{{ nodes.depart_and_wait.output.selected_point }}"
    mode: "{{ nodes.depart_and_wait.output.mode }}"
    attempts_used: "{{ nodes.depart_and_wait.output.attempts_used }}"
    arrival_status: "{{ nodes.depart_and_wait.output.arrival_status }}"
    encounter_actions: "{{ nodes.depart_and_wait.output.encounter_actions }}"
    fatigue_medicine_used: "{{ nodes.depart_and_wait.output.fatigue_medicine_used }}"
    fatigue_medicine_use_count: "{{ nodes.depart_and_wait.output.fatigue_medicine_use_count }}"
